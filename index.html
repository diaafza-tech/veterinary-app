<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوصف البيطري في السدير</title>
<style>
body{font-family:Arial;margin:0;background:#e8f0f2;direction:rtl}
header{background:#116530;color:#fff;text-align:center;padding:20px;font-size:22px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.card{background:#fff;margin:15px;padding:15px;border-radius:12px;box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2{color:#116530;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:1px solid #aaa;}
button{width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:5px;transition:0.3s;}
button:hover{background:#3ac06d;}
.total{background:#1b7f6c;color:#fff;text-align:center;padding:10px;border-radius:10px;margin-top:10px;font-weight:bold;}
.final{background:#145a32;font-weight:bold;font-size:18px;color:#fff;}
.saved{background:#dff0ea;padding:10px;margin:5px 0;border-radius:10px;}
.deleteBtn{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:8px;float:left;cursor:pointer;margin-left:5px;transition:0.2s;}
.deleteBtn:hover{background:#e55a61;}
</style>
</head>
<body>

<header>
أهلًا بكم في المستوصف البيطري في السدير<br>
اعداد البرنامج: الدكتور ضياء حسين
</header>

<div class="card">
<h2>الأدوية</h2>
<input type="text" id="breeder" placeholder="اسم المربي (اختياري)">
<select id="drug">
<option value="">اختر الدواء</option>
<option value="3750|50|جنتامايسين">جنتامايسين</option>
<option value="3700|50|تايلوسين">تايلوسين</option>
<option value="2725|50|اوكسي تتراسيكلين">اوكسي تتراسيكلين</option>
<option value="1900|50|انروفلوكساسين">انروفلوكساسين</option>
<option value="2250|50|خافض">خافض</option>
<option value="2500|50|بلوك املاح">بلوك املاح</option>
<option value="4250|50|كالسيوم">كالسيوم</option>
<option value="2300|500|سبري جروح">سبري جروح</option>
<option value="1650|150|مضاد تخمه">مضاد تخمه</option>
<option value="2300|150|مضاد نفاخ">مضاد نفاخ</option>
<option value="1250|250|تيوب ضرع">تيوب ضرع</option>
<option value="1650|150|مرهم كبريت">مرهم كبريت</option>
<option value="100|0|سرنج 10 مل">سرنج 10 مل</option>
<option value="145|0|سرنج 20 مل">سرنج 20 مل</option>
<option value="1500|100|ايفرمكتين">ايفرمكتين</option>
<option value="9500|10|باور اون">باور اون</option>
<option value="7750|10|تجريع">تجريع</option>
<option value="9850|25|بارفكوين">بارفكوين</option>
<option value="4750|5|نص باور اون">نص باور اون</option>
</select>
<input type="number" id="drugQty" placeholder="عدد الدواء" min="0">
<select id="drugAnimalType">
<option value="">اختر نوع الحيوان</option>
<option>أبقار</option>
<option>جاموس</option>
<option>أغنام</option>
<option>ماعز</option>
</select>
<input type="number" id="animalQty" placeholder="عدد الحيوان" min="0">
<select id="drugLocation">
<option value="">اختر الموقع</option>
<option value="0">داخل المستوصف</option>
<option value="1000">خارج المستوصف</option>
</select>
<button onclick="addDrug()">إضافة دواء</button>
<div id="drugList"></div>
<div class="total" id="drugBase">مجموع الأدوية: 0</div>
<div class="total" id="drugAdmin">التحميلات الإدارية: 0</div>
<div class="total" id="drugService">خدمات الدواء: 0</div>
<div class="total" id="drugCardExit">البطاقة والخروجيه: 0</div>
<div class="total final" id="drugFinal">المجموع النهائي للأدوية: 0</div>
</div>

<div class="card">
<h2>التلقيح الاصطناعي</h2>
<input type="number" id="aiQty" placeholder="عدد الأبقار/الجاموس/الأغنام/الماعز" min="0">
<input type="number" id="gloves" placeholder="عدد الكفوف" min="0">
<input type="number" id="catheter" placeholder="عدد القسطرة" min="0">
<input type="number" id="rod" placeholder="عدد القصبة" min="0">
<input type="number" id="nitrogen" placeholder="كمية النايتروجين" min="0">
<select id="aiLocation">
<option value="0">داخل المستوصف</option>
<option value="1000">خارج المستوصف</option>
</select>
<button onclick="addAI()">إضافة تلقيح</button>
<div id="aiList"></div>
<div class="total final" id="aiFinal">المجموع النهائي للتلقيح: 0</div>
</div>

<div class="card">
<h2>النقل</h2>
<select id="transport">
<option value="">اختر النوع</option>
<option value="2000">أبقار وجاموس</option>
<option value="1000">أغنام وماعز</option>
<option value="1000">القاعة الواحدة</option>
</select>
<input type="number" id="transQty" placeholder="العدد" min="0">
<button onclick="addTransport()">إضافة نقل</button>
<div id="transList"></div>
<div class="total final" id="transFinal">المجموع النهائي للنقل: 0</div>
</div>

<div class="card">
<button onclick="savePrescription()">💾 حفظ الوصفة</button>
</div>

<div class="card">
<h2>الوصفات المحفوظة</h2>
<button onclick="clearAll()" style="background:red;color:white;padding:8px;border:none;border-radius:6px;margin-bottom:5px;cursor:pointer">حذف جميع الوصفات</button>
<div id="savedList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let drugs=[], aiData=null, transports=[];
let drugFinalTotal=0, aiFinalTotal=0, transportFinalTotal=0;

function addDrug(){
  let breeder=document.getElementById("breeder").value;
  let select = document.getElementById("drug");
  let qty = parseInt(document.getElementById("drugQty").value) || 0;
  let animalType = document.getElementById("drugAnimalType").value;
  let animalQty = parseInt(document.getElementById("animalQty").value) || 0;
  let location = parseInt(document.getElementById("drugLocation").value) || 0;
  if(!select.value || !animalType){alert("اختر الدواء ونوع الحيوان"); return;}
  let [price,service,name] = select.value.split("|");
  price=parseInt(price); service=parseInt(service);
  drugs.push({breeder,name,price,service,qty,animalType,animalQty,location});
  showDrugs(); calculateDrugs();
}

function showDrugs(){
  let list = document.getElementById("drugList");
  list.innerHTML="";
  drugs.forEach((d,i)=>{
    list.innerHTML+=`<div class="saved">
      ${d.breeder? d.breeder+" - " : ""}${d.name} × ${d.qty} | نوع الحيوان: ${d.animalType} | عدد الحيوان: ${d.animalQty} | الموقع: ${d.location>0?"خارج المستوصف":"داخل المستوصف"}
      <button class="deleteBtn" onclick="removeDrug(${i})">حذف</button>
    </div>`;
  });
}

function removeDrug(i){drugs.splice(i,1); showDrugs(); calculateDrugs();}

function calculateDrugs(){
  let base=0, admin=0, serviceTotal=0, cardExit=500;
  let serviceFlag=false;
  drugs.forEach(d=>{
    base += d.price*d.qty;
    // خدمات الدواء حسب عدد الحيوان
    serviceTotal += d.animalQty*d.service;
    if(d.location>0) serviceFlag=true;
  });
  admin = Math.ceil(base/5000)*50;
  if(!serviceFlag) cardExit=500;
  else cardExit+=1000;
  drugFinalTotal = base + admin + serviceTotal + cardExit;
  document.getElementById("drugBase").innerText="مجموع الأدوية: "+base;
  document.getElementById("drugAdmin").innerText="التحميلات الإدارية: "+admin;
  document.getElementById("drugService").innerText="خدمات الدواء: "+serviceTotal;
  document.getElementById("drugCardExit").innerText="البطاقة والخروجيه: "+cardExit;
  document.getElementById("drugFinal").innerText="المجموع النهائي للأدوية: "+drugFinalTotal;
}

function addAI(){
  let qty=parseInt(document.getElementById("aiQty").value)||0;
  let gloves=parseInt(document.getElementById("gloves").value)||0;
  let catheter=parseInt(document.getElementById("catheter").value)||0;
  let rod=parseInt(document.getElementById("rod").value)||0;
  let nitrogen=parseInt(document.getElementById("nitrogen").value)||0;
  let location=parseInt(document.getElementById("aiLocation").value)||0;
  let final = qty*1000 + gloves*46 + catheter*65 + rod*1100 + nitrogen*450 + location;
  aiFinalTotal = final;
  document.getElementById("aiList").innerHTML=<div class="saved">تلقيح ${qty} حيوان<button class="deleteBtn" onclick="removeAI()">حذف</button></div>;
  document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: "+aiFinalTotal;
}

function removeAI(){aiData=null; aiFinalTotal=0; document.getElementById("aiList").innerHTML=""; document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: 0";}

function addTransport(){
  let type=document.getElementById("transport").value;
  let name=document.getElementById("transport").options[document.getElementById("transport").selectedIndex].text;
  let qty=parseInt(document.getElementById("transQty").value)||0;
  if(!type || !qty) return;
  transports.push({name,type:parseInt(type),qty});
  showTransport();
}

function showTransport(){
  let html="";
  let transTotal=0;
  transports.forEach((t,i)=>{
    let price = t.type* t.qty + 500; // ثمن البطاقة
    transTotal += price;
    html+=<div class="saved">${t.name} × ${t.qty} | بطاقة + النقل: ${price} <button class="deleteBtn" onclick="removeTransport(${i})">حذف</button></div>;
  });
  document.getElementById("transList").innerHTML=html;
  transportFinalTotal=transTotal;
  document.getElementById("transFinal").innerText="المجموع النهائي للنقل: "+transportFinalTotal;
}

function removeTransport(i){transports.splice(i,1); showTransport();}

function savePrescription(){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  saved.push({
    drugs,transports,aiFinalTotal,date:new Date().toLocaleString()
  });
  localStorage.setItem("prescriptions",JSON.stringify(saved));
  alert("تم حفظ الوصفة ✅");
  showSaved();
}

function showSaved(){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  let html="";
  saved.forEach((s,i)=>{
    html+=`<div class="saved">الوصفة ${i+1} - التاريخ: ${s.date}<br>
    أدوية: ${s.drugs.map(d=>d.name+"×"+d.qty).join(", ")}<br>
    التلقيح: ${s.aiFinalTotal}<br>
    النقل: ${s.transports.map(t=>t.name+"×"+t.qty).join(", ")}<br>
    <button class="deleteBtn" onclick="deleteSaved(${i})">حذف</button>
    </div>`;
  });
  document.getElementById("savedList").innerHTML=html;
}

function deleteSaved(i){let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]"); saved.splice(i,1); localStorage.setItem("prescriptions",JSON.stringify(saved)); showSaved();}

function clearAll(){if(confirm("هل تريد حذف جميع الوصفات؟")){localStorage.removeItem("prescriptions"); showSaved();}}

showSaved();
</script>
</body>
</html>
