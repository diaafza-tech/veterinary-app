<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوصف البيطري في السدير</title>
<style>
body{font-family:Arial;margin:0;background:#e8f0f2;direction:rtl}
header{background:#116530;color:#fff;text-align:center;padding:20px;font-size:22px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.card{background:#fff;margin:15px;padding:15px;border-radius:12px;box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2{color:#116530}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:1px solid #aaa}
button{width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:5px;transition:0.3s;}
button:hover{background:#3ac06d;}
.total{background:#1b7f6c;color:#fff;text-align:center;padding:10px;border-radius:10px;margin-top:10px;font-weight:bold;}
.final{background:#145a32;font-weight:bold;font-size:18px;color:#fff;}
.saved{background:#dff0ea;padding:10px;margin:5px 0;border-radius:10px;}
.deleteBtn{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:8px;float:left;cursor:pointer;margin-left:5px;transition:0.2s;}
.deleteBtn:hover{background:#e55a61;}
</style>
</head>
<body>

<header>
أهلآ بكم في المستوصف البيطري في السدير<br>
اعداد البرنامج: الدكتور ضياء حسين
</header>

<div class="card">
<h2>الأدوية</h2>
<input type="text" id="breeder" placeholder="اسم المربي (اختياري)">
<select id="drug">
<option value="">اختر الدواء</option>
<option value="3750|50|0|0|50">جنتامايسين</option>
<option value="3700|50|0|0|50">تايلوسين</option>
<option value="2725|50|0|0|50">أوكسي تتراسيكلين</option>
<option value="1900|50|0|0|50">انروفلوكساسين</option>
<option value="2250|50|0|0|50">خافض</option>
<option value="2500|50|0|0|50">بلوك أملاح</option>
<option value="4250|50|0|0|50">كالسيوم</option>
<option value="2300|500|0|0|500">سبري جروح</option>
<option value="1650|150|0|0|150">مضاد تخمه</option>
<option value="2300|150|0|0|150">مضاد نفاخ</option>
<option value="1250|250|0|0|250">تيوب ضرع</option>
<option value="1650|150|0|0|150">مرهم كبريت</option>
<option value="100|0|0|0|0">سرنج 10 مل</option>
<option value="145|0|0|0|0">سرنج 20 مل</option>
<option value="1500|100|0|0|100">ايفرمكتين</option>
<option value="9500|10|0|0|10">باور اون</option>
<option value="7750|10|0|0|10">تجريع</option>
<option value="9850|25|0|0|25">بارفكوين</option>
<option value="4750|5|0|0|5">نص باور اون</option>
</select>
<input type="number" id="drugQty" placeholder="عدد الدواء" value="0">
<select id="drugAnimalType">
<option value="">نوع الحيوان</option>
<option>أبقار</option>
<option>جاموس</option>
<option>أغنام</option>
<option>ماعز</option>
</select>
<input type="number" id="animalQty" placeholder="عدد الحيوان" value="0">
<select id="drugLocation">
<option value="">اختر الموقع</option>
<option value="0">داخل المستوصف</option>
<option value="1000">خارج المستوصف</option>
</select>
<button onclick="addDrug()">إضافة</button>
<div id="drugList"></div>
<div class="total" id="drugBase">مجموع الأدوية: 0</div>
<div class="total" id="drugAdmin">التحميلات الإدارية: 0</div>
<div class="total" id="drugService">خدمات الدواء: 0</div>
<div class="total" id="drugCardExit">البطاقة والخروجيه: 0</div>
<div class="total final" id="drugFinal">المجموع النهائي للأدوية: 0</div>
</div>

<div class="card">
<h2>التلقيح الاصطناعي</h2>
<input type="number" id="aiQty" placeholder="عدد الأبقار" value="0">
<label>عدد الكفوف</label><input type="number" id="gloves" placeholder="عدد الكفوف" value="0">
<label>عدد القسطرة</label><input type="number" id="catheter" placeholder="عدد القسطرة" value="0">
<label>عدد القصبة</label><input type="number" id="rod" placeholder="عدد القصبة" value="0">
<label>كمية النايتروجين</label><input type="number" id="nitrogen" placeholder="كمية النايتروجين" value="0">
<select id="aiLocation">
<option value="0">داخل المستوصف</option>
<option value="1000">خارج المستوصف</option>
</select>
<button onclick="calculateAI()">إضافة تلقيح</button>
<div id="aiList"></div>
<div class="total" id="aiFinal">المجموع النهائي للتلقيح: 0</div>
</div>

<div class="card">
<h2>النقل</h2>
<select id="transport">
<option value="">اختر النوع</option>
<option value="2000">أبقار وجاموس</option>
<option value="1000">أغنام وماعز</option>
<option value="1000">القاعة الواحدة</option>
</select>
<input type="number" id="transQty" placeholder="العدد" value="0">
<button onclick="addTransport()">إضافة نقل</button>
<div id="transList"></div>
<div class="total" id="transTotal">مجموع النقل: 0</div>
</div>

<div class="card">
<button onclick="savePrescription()">💾 حفظ الوصفة</button>
</div>

<div class="card">
<h2>الوصفات المحفوظة</h2>
<button onclick="clearAll()" style="background:red;color:white;padding:8px;border:none;border-radius:6px;margin-bottom:5px;cursor:pointer">حذف جميع الوصفات</button>
<div id="savedList"></div>
</div>

<script>
let drugs=[], transports=[], aiData=null;

function addDrug(){
  let breeder=document.getElementById("breeder").value;
  let select=document.getElementById("drug");
  let qty=parseInt(document.getElementById("drugQty").value)||0;
  let animalType=document.getElementById("drugAnimalType").value;
  let animalQty=parseInt(document.getElementById("animalQty").value)||0;
  let location=parseInt(document.getElementById("drugLocation").value)||0;
  if(!select.value || !animalType){alert("اكمل البيانات"); return;}
  let name=select.options[select.selectedIndex].text;
  let [price,service,,_,servicePerAnimal]=select.value.split("|").map(Number);
  drugs.push({breeder,name,price,service,servicePerAnimal,qty,animalType,animalQty,location});
  showDrugs();
  calculateDrugs();
}

function showDrugs(){
  let list=document.getElementById("drugList");
  list.innerHTML="";
  drugs.forEach((d,i)=>{
    list.innerHTML+=`<div class="saved">
${d.breeder?d.breeder+" - ":""}${d.name} × ${d.qty} | نوع الحيوان: ${d.animalType} | عدد الحيوان: ${d.animalQty} | الموقع: ${d.location? (d.location==1000?"خارج المستوصف":"داخل المستوصف"):""} 
<button class="deleteBtn" onclick="removeDrug(${i})">حذف</button>
</div>`;
  });
}

function removeDrug(index){drugs.splice(index,1); showDrugs(); calculateDrugs();}

function addTransport(){
  let select=document.getElementById("transport");
  let qty=parseInt(document.getElementById("transQty").value)||0;
  if(!select.value||qty<=0){alert("اختر النوع والعدد");return;}
  let name=select.options[select.selectedIndex].text;
  transports.push({name,price:+select.value,qty});
  showTransport(); calculateTransport();
}

function showTransport(){
  let list=document.getElementById("transList");
  list.innerHTML="";
  transports.forEach((t,i)=>{
    list.innerHTML+=<div class="saved">${t.name} × ${t.qty} <button class="deleteBtn" onclick="removeTransport(${i})">حذف</button></div>;
  });
}

function removeTransport(index){transports.splice(index,1); showTransport(); calculateTransport();}

function calculateDrugs(){
  let base=0,admin=0,serviceTotal=0,cardExit=0;
  drugs.forEach(d=>{
    base+=d.price*d.qty;
    serviceTotal+=d.servicePerAnimal*d.animalQty;
    admin+=Math.ceil(base/5000)*50;
    cardExit=500+Math.max(...drugs.map(x=>x.location));
  });
  let final=base+admin+serviceTotal+cardExit;
  document.getElementById("drugBase").innerText="مجموع الأدوية: "+base;
  document.getElementById("drugAdmin").innerText="التحميلات الإدارية: "+admin;
  document.getElementById("drugService").innerText="خدمات الدواء: "+serviceTotal;
  document.getElementById("drugCardExit").innerText="البطاقة والخروجيه: "+cardExit;
  document.getElementById("drugFinal").innerText="المجموع النهائي للأدوية: "+final;
}

function calculateAI(){
  let qty=parseInt(document.getElementById("aiQty").value)||0;
  let gloves=parseInt(document.getElementById("gloves").value)||0;
  let catheter=parseInt(document.getElementById("catheter").value)||0;
  let rod=parseInt(document.getElementById("rod").value)||0;
  let nitrogen=parseInt(document.getElementById("nitrogen").value)||0;
  let location=parseInt(document.getElementById("aiLocation").value)||0;
  let perCow=(gloves*46)+(catheter*65)+(rod*1100)+(nitrogen*450);
  let admin=Math.ceil(perCow/5000)*50;
  let final=perCow+admin+location+500;
  aiData={qty,final};
  document.getElementById("aiList").innerHTML=<div class="saved">تلقيح ${qty} بقرة <button class="deleteBtn" onclick="removeAI()">حذف</button></div>;
  document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: "+final;
}

function removeAI(){aiData=null;document.getElementById("aiList").innerHTML="";document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: 0";}

function calculateTransport(){
  let total=0;
  transports.forEach(t=>{total+=t.price*t.qty+500;}); // البطاقة للنقل
  document.getElementById("transTotal").innerText="مجموع النقل: "+total;
}

function savePrescription(){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  let data={drugs,transports,aiData,date:new Date().toLocaleString()};
  saved.push(data);
  localStorage.setItem("prescriptions",JSON.stringify(saved));
  alert("تم حفظ الوصفة ✅");
  showSaved();
}

function showSaved(){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  let html="";
  saved.forEach((s,i)=>{
    html+=`<div class="saved">
تاريخ: ${s.date} <button class="deleteBtn" onclick="deleteSaved(${i})">حذف</button>
</div>`;
  });
  document.getElementById("savedList").innerHTML=html;
}

function deleteSaved(index){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  saved.splice(index,1);
  localStorage.setItem("prescriptions",JSON.stringify(saved));
  showSaved();
}

function clearAll(){if(confirm("هل تريد حذف جميع الوصفات؟")){localStorage.removeItem("prescriptions"); showSaved();}}

showSaved();
</script>
</body>
</html>
