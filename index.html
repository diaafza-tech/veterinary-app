<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوصف البيطري في السدير</title>
<style>
body{font-family:Arial;margin:0;background:#e8f0f2;direction:rtl}
header{background:#116530;color:#fff;text-align:center;padding:20px;font-size:22px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.card{background:#fff;margin:15px;padding:15px;border-radius:12px;box-shadow:0 4px 8px rgba(0,0,0,0.1);}
h2{color:#116530}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:1px solid #aaa}
button{width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:5px;transition:0.3s;}
button:hover{background:#3ac06d;}
.total{background:#1b7f6c;color:#fff;text-align:center;padding:10px;border-radius:10px;margin-top:10px;font-weight:bold;}
.final{background:#145a32;font-weight:bold;font-size:18px;color:#fff;}
.saved{background:#dff0ea;padding:10px;margin:5px 0;border-radius:10px;}
.deleteBtn{background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:8px;float:left;cursor:pointer;margin-left:5px;transition:0.2s;}
.deleteBtn:hover{background:#e55a61;}
</style>
</head>
<body>
<header>
أهلآ بكم في المستوصف البيطري في السدير<br>
اعداد البرنامج: الدكتور ضياء حسين
</header>

<div class="card">
<h2>الأدوية</h2>
<input type="text" id="breeder" placeholder="اسم المربي (اختياري)">
<select id="drug">
<option value="">اختر الدواء</option>
<option value="3750|50">جنتامايسين</option>
<option value="3700|50">تايلوسين</option>
<option value="2725|50">أوكسي تتراسيكلين</option>
<option value="1900|50">انروفلوكساسين</option>
<option value="2250|50">خافض</option>
<option value="2500|50">بلوك املاح</option>
<option value="4250|50">كالسيوم</option>
<option value="2300|500">سبري جروح</option>
<option value="1650|150">مضاد تخمه</option>
<option value="2300|150">مضاد نفاخ</option>
<option value="1250|250">تيوب ضرع</option>
<option value="1650|150">مرهم كبريت</option>
<option value="100|0">سرنج 10 مل</option>
<option value="145|0">سرنج 20 مل</option>
<option value="1500|0">ايفرمكتين</option>
<option value="9500|0">باور اون</option>
<option value="7750|0">تجريع</option>
<option value="9850|25">بارفكوين</option>
<option value="4750|0">نص باور اون</option>
</select>
<input type="number" id="drugQty" placeholder="عدد الدواء" min="0">
<select id="drugAnimalType">
<option value="">نوع الحيوان</option>
<option>أبقار</option>
<option>جاموس</option>
<option>أغنام</option>
<option>ماعز</option>
</select>
<input type="number" id="animalQty" placeholder="عدد الحيوان" min="0">
<select id="drugLocation">
<option value="">اختر الموقع</option>
<option value="داخل المستوصف">داخل المستوصف</option>
<option value="خارج المستوصف">خارج المستوصف</option>
</select>
<button id="addDrugBtn">إضافة</button>
<div id="drugList"></div>
<div class="total" id="drugBase">مجموع الأدوية: 0</div>
<div class="total" id="drugAdmin">التحميلات الإدارية: 0</div>
<div class="total" id="drugService">خدمات الدواء: 0</div>
<div class="total final" id="drugCardExit">البطاقة والخروجيّة: 0</div>
<div class="total final" id="drugFinal">المجموع النهائي للأدوية: 0</div>
</div>

<div class="card">
<h2>التلقيح الاصطناعي (أبقار)</h2>
<input type="number" id="aiQty" placeholder="عدد الأبقار" min="0">
<label>عدد الكفوف</label><input type="number" id="gloves" placeholder="عدد الكفوف" min="0">
<label>عدد القسطرة</label><input type="number" id="catheter" placeholder="عدد القسطرة" min="0">
<label>عدد القصبة</label><input type="number" id="rod" placeholder="عدد القصبة" min="0">
<label>كمية النايتروجين</label><input type="number" id="nitrogen" placeholder="كمية النايتروجين" min="0">
<select id="aiLocation">
<option value="">اختر الموقع</option>
<option value="0">داخل المستوصف</option>
<option value="1000">خارج المستوصف</option>
</select>
<button id="addAIBtn">إضافة تلقيح</button>
<div id="aiList"></div>
<div class="total final" id="aiFinal">المجموع النهائي للتلقيح: 0</div>
</div>

<div class="card">
<h2>النقل</h2>
<select id="transport">
<option value="">اختر النوع</option>
<option value="2000">أبقار وجاموس</option>
<option value="1000">أغنام وماعز</option>
<option value="1000">القاعة الواحدة</option>
</select>
<input type="number" id="transQty" placeholder="العدد" min="0">
<button id="addTransportBtn">إضافة نقل</button>
<div id="transList"></div>
<div class="total final" id="transFinal">المجموع النهائي للنقل: 0</div>
</div>

<div class="card">
<button id="saveBtn">💾 حفظ الوصفة</button>
</div>

<div class="card">
<h2>الوصفات المحفوظة</h2>
<button onclick="clearAll()" style="background:red;color:white;padding:8px;border:none;border-radius:6px;margin-bottom:5px;cursor:pointer">حذف جميع الوصفات</button>
<div id="savedList"></div>
</div>

<script>
let drugs=[], transports=[], aiData=null;
let drugFinalTotal=0, transportFinalTotal=0, aiFinalTotal=0;

// الأدوية
document.getElementById("addDrugBtn").addEventListener("click",()=>{
  let breeder=document.getElementById("breeder").value;
  let select=document.getElementById("drug");
  let qty=parseInt(document.getElementById("drugQty").value)||0;
  let animalType=document.getElementById("drugAnimalType").value;
  let animalQty=parseInt(document.getElementById("animalQty").value)||0;
  let location=document.getElementById("drugLocation").value;
  if(!select.value || !animalType){alert("اكمل البيانات الأساسية للدواء"); return;}
  let name=select.options[select.selectedIndex].text;
  let [price,service]=select.value.split("|").map(Number);
  // خدمات الدواء
  let serviceTotal=animalQty*service;
  // البطاقة والخروجيه
  let cardExit=500 + (location=="خارج المستوصف"?1000:0);
  drugs.push({breeder,name,price,qty,animalType,animalQty,serviceTotal,cardExit});
  showDrugs();
  calculateDrugs();
});

function showDrugs(){
  let list=document.getElementById("drugList");
  list.innerHTML="";
  drugs.forEach((d,i)=>{
    list.innerHTML+=<div class="saved">${d.breeder?d.breeder+" - ":""}${d.name} × ${d.qty} | ${d.animalType} × ${d.animalQty} | الموقع: ${d.cardExit>500?"خارج":"داخل"} <button class="deleteBtn" onclick="removeDrug(${i})">حذف</button></div>;
  });
}

function removeDrug(i){drugs.splice(i,1); showDrugs(); calculateDrugs();}

function calculateDrugs(){
  let base=0, service=0, cardExit=0;
  drugs.forEach(d=>{base+=d.price*d.qty; service+=d.serviceTotal; cardExit+=d.cardExit;});
  let admin=Math.ceil(base/5000)*50;
  let final=base+service+admin+cardExit;
  document.getElementById("drugBase").innerText="مجموع الأدوية: "+base;
  document.getElementById("drugAdmin").innerText="التحميلات الإدارية: "+admin;
  document.getElementById("drugService").innerText="خدمات الدواء: "+service;
  document.getElementById("drugCardExit").innerText="البطاقة والخروجيّة: "+cardExit;
  document.getElementById("drugFinal").innerText="المجموع النهائي للأدوية: "+final;
  drugFinalTotal=final;
  updateGrandTotal();
}

// النقل
document.getElementById("addTransportBtn").addEventListener("click",()=>{
  let select=document.getElementById("transport");
  let qty=parseInt(document.getElementById("transQty").value)||0;
  if(!select.value) return;
  transports.push({name:select.options[select.selectedIndex].text,price:+select.value,qty,card:500});
  showTransport();
  calculateTransport();
});

function showTransport(){
  let html="";
  transports.forEach((t,i)=>{html+=<div class="saved">${t.name} × ${t.qty} <button class="deleteBtn" onclick="removeTransport(${i})">حذف</button></div>;});
  document.getElementById("transList").innerHTML=html;
}

function removeTransport(i){transports.splice(i,1); showTransport(); calculateTransport();}

function calculateTransport(){
  let total=0;
  transports.forEach(t=>{total+=t.price*t.qty+t.card;});
  document.getElementById("transFinal").innerText="المجموع النهائي للنقل: "+total;
  transportFinalTotal=total;
  updateGrandTotal();
}

// التلقيح
document.getElementById("addAIBtn").addEventListener("click",()=>{
  let qty=parseInt(document.getElementById("aiQty").value)||0;
  let gloves=parseInt(document.getElementById("gloves").value)||0;
  let catheter=parseInt(document.getElementById("catheter").value)||0;
  let rod=parseInt(document.getElementById("rod").value)||0;
  let nitrogen=parseInt(document.getElementById("nitrogen").value)||0;
  let location=parseInt(document.getElementById("aiLocation").value)||0;
  if(qty==0) return;
  let perCow=(gloves*46)+(catheter*65)+(rod*1100)+(nitrogen*450);
  let admin=Math.ceil(perCow/5000)*50;
  let final=(perCow+admin+1000+location)*qty;
  aiData={qty,perCow,admin,final};
  document.getElementById("aiList").innerHTML=<div class="saved">تلقيح ${qty} بقرة <button class="deleteBtn" onclick="removeAI()">حذف</button></div>;
  document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: "+final;
  aiFinalTotal=final;
  updateGrandTotal();
});

function removeAI(){aiData=null; document.getElementById("aiList").innerHTML=""; document.getElementById("aiFinal").innerText="المجموع النهائي للتلقيح: 0"; aiFinalTotal=0; updateGrandTotal();}

// المجموع الكلي
function updateGrandTotal(){
  let grand=drugFinalTotal+transportFinalTotal+aiFinalTotal;
  console.log("المجموع الكلي:",grand);
}

// الحفظ
document.getElementById("saveBtn").addEventListener("click",()=>{
  let data={drugs,transports,ai:aiData,date:new Date().toLocaleString()};
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  saved.push(data);
  localStorage.setItem("prescriptions",JSON.stringify(saved));
  showSaved();
  alert("تم حفظ الوصفة ✅");
});

function showSaved(){
  let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]");
  let html="";
  saved.forEach((s,i)=>{html+=<div class="saved">الوصفة ${i+1} <button class="deleteBtn" onclick="deleteSaved(${i})">حذف</button></div>;});
  document.getElementById("savedList").innerHTML=html;
}
function deleteSaved(i){let saved=JSON.parse(localStorage.getItem("prescriptions")||"[]"); saved.splice(i,1); localStorage.setItem("prescriptions",JSON.stringify(saved)); showSaved();}
function clearAll(){if(confirm("هل تريد حذف جميع الوصفات؟")){localStorage.removeItem("prescriptions"); showSaved();}}
showSaved();
</script>
</body>
</html>
