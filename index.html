<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المستوصف البيطري في السدير</title>

<style>

body{
font-family:Arial;
background:#eef2f3;
direction:rtl;
padding:20px;
}

h1{
text-align:center;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
margin-top:5px;
width:100%;
font-size:16px;
border-radius:6px;
}

.result{
background:#fff;
padding:10px;
margin-top:15px;
}

</style>
</head>

<body>

<h1>اهلا بكم في المستوصف البيطري في السدير</h1>
<p style="text-align:center">اعداد البرنامج : الدكتور ضياء حسين</p>

<div class="box">

<h3>الأدوية</h3>

<input id="breeder" placeholder="اسم المربي (اختياري)">

<select id="medicine">

<option>جنتامايسين</option>
<option>تايلوسين</option>
<option>انروفلوكساسين</option>
<option>اوكسي تتراسيكلين</option>
<option>خافض</option>
<option>بلوك املاح</option>
<option>كالسيوم</option>
<option>سبري جروح</option>
<option>مضاد تخمه</option>
<option>مضاد نفاخ</option>
<option>تيوب ضرع</option>
<option>مرهم كبريت</option>
<option>سرنج 10 مل</option>
<option>سرنج 20 مل</option>
<option>ايفرمكتين</option>
<option>باور اون</option>
<option>تجريع</option>
<option>بارفكوين</option>
<option>نص باور اون</option>

</select>

<input type="number" id="medcount" placeholder="عدد الدواء">

<select id="animal">

<option>بقر</option>
<option>غنم</option>
<option>ماعز</option>
<option>جاموس</option>

</select>

<input type="number" id="animalcount" placeholder="عدد الحيوان" min="0">

<select id="place">

<option>داخل المستوصف</option>
<option>خارج المستوصف</option>

</select>

<button onclick="addMedicine()">اضافة الدواء</button>

</div>

<div class="box">

<h3>النقل</h3>

<input id="transportanimal" placeholder="نوع الحيوان">

<input type="number" id="transportcount" placeholder="عدد الحيوان">

<button onclick="addTransport()">اضافة النقل</button>

</div>

<div class="box">

<h3>التلقيح</h3>

<input id="vaccineanimal" placeholder="نوع الحيوان">

<input type="number" id="vaccinecount" placeholder="عدد الحيوان">

<button onclick="addVaccine()">اضافة التلقيح</button>

</div>

<div class="result">

<h3>السجل</h3>

<div id="records"></div>

</div>

<script>

let records=[];

function save(){
localStorage.setItem("vetRecords",JSON.stringify(records));
}

function load(){
let data=localStorage.getItem("vetRecords");
if(data){
records=JSON.parse(data);
show();
}
}

function show(){

let html="";

records.forEach(r=>{
html+= "<p>"+r+"</p>";
});

document.getElementById("records").innerHTML=html;

}

function addMedicine(){

let breeder=document.getElementById("breeder").value;

let medicine=document.getElementById("medicine").value;

let medcount=document.getElementById("medcount").value;

let animal=document.getElementById("animal").value;

let animalcount=document.getElementById("animalcount").value;

let place=document.getElementById("place").value;

let text="دواء: "+medicine+
" | عدد الدواء: "+medcount+
" | الحيوان: "+animal+
" | عدد الحيوان: "+animalcount+
" | الموقع: "+place+
" | المربي: "+breeder;

records.push(text);

save();
show();

}

function addTransport(){

let animal=document.getElementById("transportanimal").value;

let count=document.getElementById("transportcount").value;

let text="نقل حيوان: "+animal+" | العدد: "+count+" | ثمن البطاقة: 500";

records.push(text);

save();
show();

}

function addVaccine(){

let animal=document.getElementById("vaccineanimal").value;

let count=document.getElementById("vaccinecount").value;

let text="تلقيح حيوان: "+animal+" | العدد: "+count;

records.push(text);

save();
show();

}

load();

</script>

</body>
</html>
